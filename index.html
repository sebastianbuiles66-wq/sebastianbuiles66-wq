<script>
// =======================
// 🎮 SLIDER (hover automático)
// =======================
const track = document.querySelector('.slider-track');
const nextBtn = document.querySelector('.next');
const prevBtn = document.querySelector('.prev');

let index = 0;
let interval = null;

const total = document.querySelectorAll('.project').length;

function updateSlider() {
    track.style.transform = `translateX(-${index * 100}%)`;
}

function moveRight() {
    if (index < total - 1) {
        index++;
        updateSlider();
    }
}

function moveLeft() {
    if (index > 0) {
        index--;
        updateSlider();
    }
}

// Hover derecha
nextBtn.addEventListener('mouseenter', () => {
    interval = setInterval(moveRight, 800);
});

nextBtn.addEventListener('mouseleave', () => {
    clearInterval(interval);
});

// Hover izquierda
prevBtn.addEventListener('mouseenter', () => {
    interval = setInterval(moveLeft, 800);
});

prevBtn.addEventListener('mouseleave', () => {
    clearInterval(interval);
});


// =======================
// 🐱 GATOS
// =======================
const container = document.querySelector('.cats-bg');
const scoreText = document.getElementById('score');

let score = 0;

function createCat() {
    if (!container) return;

    const cat = document.createElement('span');
    cat.textContent = "🐱";

    cat.style.position = "absolute";
    cat.style.fontSize = "80px";
    cat.style.left = Math.random() * 100 + "%";
    cat.style.top = "100%";

    const duration = 10 + Math.random() * 6;
    cat.style.animation = `floatCats ${duration}s linear`;

    cat.addEventListener('click', () => {
        score++;
        if (scoreText) scoreText.textContent = score;

        cat.textContent = "💥";
        cat.style.transform = "scale(2)";

        setTimeout(() => cat.remove(), 200);
    });

    container.appendChild(cat);

    setTimeout(() => cat.remove(), duration * 1000);
}

setInterval(createCat, 5000);


// =======================
// 🖱️ CURSOR PERSONALIZADO
// =======================
const cursor = document.querySelector('.cursor');

document.addEventListener('mousemove', (e) => {
    if (!cursor) return;
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

document.addEventListener('click', () => {
    if (!cursor) return;
    cursor.style.transform = "translate(-50%, -50%) scale(1.8)";
    setTimeout(() => {
        cursor.style.transform = "translate(-50%, -50%) scale(1)";
    }, 100);
});
</script>
