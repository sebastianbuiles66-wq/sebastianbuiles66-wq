<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portafolio - Sebastián</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #38bdf8;
        }

        .skills {
            margin: 20px 0;
        }

        .skills span {
            background-color: #1e293b;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 8px;
            display: inline-block;
        }

        .quote {
            margin-top: 20px;
            font-style: italic;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sebastian Builes Ortiz</h1>

        <h2>Unity Game Developer creando experiencias interactivas</h2>

        <div class="skills">
            <span>Unity</span>
            <span>C#</span>
            <span>Gameplay Programming</span>
            <span>Git/GitHub</span>
        </div>

        <p class="quote">
            "Transformo ideas en mecánicas de juego."
        </p>
    </div>

</body>
</html>
